<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>👾 NEON GALLOWS · Аккаунты & Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #2a0a4a, #0b0015);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* Модальное окно авторизации */
        .auth-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000cc;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .auth-box {
            background: #1a0b2e;
            border-radius: 48px;
            padding: 30px 24px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 40px #b76eff, 0 0 0 2px #ffb347 inset;
            border: 1px solid #ffd966;
        }
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: #2e0a4e;
            border: none;
            border-radius: 40px;
            color: #e0c0ff;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #a55cff;
        }
        .auth-tab.active {
            background: #ffb347;
            color: #110022;
            border-color: #fff2b0;
            box-shadow: 0 0 20px #ffae00;
        }
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            background: #0f0020;
            border: 2px solid #b76eff;
            border-radius: 60px;
            color: #ffdb8a;
            font-size: 1rem;
            outline: none;
        }
        .auth-input::placeholder { color: #a070c0; }
        .error-msg {
            color: #ff7b7b;
            font-size: 0.9rem;
            margin: 4px 0;
            min-height: 22px;
        }
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: #ffb347;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #1a0033;
            box-shadow: 0 6px 0 #b45f06, 0 0 15px #ffb347;
            cursor: pointer;
            margin-top: 8px;
        }

        /* Основной интерфейс (скрыт до входа) */
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            background: rgba(20, 5, 40, 0.65);
            backdrop-filter: blur(18px);
            border-radius: 48px;
            padding: 24px 20px 30px;
            box-shadow: 0 30px 40px -5px #000000cc, 0 0 0 2px #b76eff inset, 0 0 20px #b76eff66;
            border: 1px solid #ffd966;
            display: none;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f0e68c, #ffb347, #ff6ec7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #ff66c4;
        }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f103acc;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
            border: 1px solid #ffb347;
        }
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .logout-btn {
            background: #6a0dad;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #3c0066;
        }

        .main-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .game-col { flex: 2; min-width: 300px; }
        .side-col { flex: 1.2; min-width: 260px; }

        /* Лобби */
        .lobby-panel {
            background: #1f103acc;
            border-radius: 48px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border: 1px solid #ffb347;
            box-shadow: 0 0 20px #ff9900;
        }

        .connection-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: #ffb347;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: #1a0033;
            box-shadow: 0 6px 0 #b45f06, 0 0 15px #ffb347;
            cursor: pointer;
            transition: all 0.08s;
            border: 1px solid #ffe694;
            flex: 0 0 auto;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b45f06, 0 0 20px #ffb347; }
        .btn:disabled { opacity: 0.4; transform: none; box-shadow: 0 4px 0 #7b341e; pointer-events: none; filter: grayscale(0.5); }
        .btn.secondary { background: #6a0dad; box-shadow: 0 4px 0 #3c0066, 0 0 12px #b76eff; color: #f0e6ff; border-color: #c28aff; }

        .id-badge {
            background: #0f0020;
            padding: 10px 16px;
            border-radius: 40px;
            color: #fdd48b;
            font-family: monospace;
            font-size: 1rem;
            border: 1px solid #ffb347;
            flex: 1;
            text-align: center;
        }

        .status {
            display: inline-block;
            background: #2a0044;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            color: #ffe3b0;
            border-left: 4px solid #ffb347;
        }

        .players-list {
            margin-top: 14px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .player-tag {
            background: #21003d;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffdb8a;
            border-left: 6px solid #ff9900;
            font-weight: bold;
        }

        .difficulty-selector {
            display: flex;
            gap: 8px;
            margin: 15px 0 5px;
        }
        .diff-btn {
            background: #2e0a4e;
            border: 2px solid #a55cff;
            color: #e0c0ff;
            padding: 8px 8px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .diff-btn.active { background: #ffb82e; color: #110022; border-color: #fff2b0; box-shadow: 0 0 25px #ffae00; }

        /* Игровая зона */
        .game-area {
            background: #140626cc;
            border-radius: 48px;
            padding: 20px 16px;
            border: 1px solid #ffb347;
            box-shadow: 0 0 30px #c27dff33;
        }

        canvas {
            background: #1c0533;
            border-radius: 30px;
            padding: 8px;
            width: 100%;
            max-width: 280px;
            height: auto;
            border: 3px solid #ffb347;
            box-shadow: 0 0 35px #ffae00;
            display: block;
            margin: 0 auto;
        }

        .word-display {
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            letter-spacing: 12px;
            text-align: center;
            font-weight: 900;
            color: #fff5d6;
            text-shadow: 0 0 20px #ffc0cb, 0 4px 0 #a64dff;
            margin: 8px 0 16px;
        }

        .alphabet {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 16px 0 8px;
        }
        .letter-btn {
            width: clamp(42px, 10vw, 56px);
            height: clamp(42px, 10vw, 56px);
            border-radius: 20px;
            background: #1f0040;
            border: 3px solid #b76eff;
            color: #ffeabf;
            font-weight: 900;
            font-size: 1.6rem;
            box-shadow: 0 5px 0 #400060, 0 0 12px #c27dff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .letter-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #400060, 0 0 20px #ffb347; }
        .letter-btn.used { opacity: 0.5; background: #332244; border-color: #8866aa; pointer-events: none; }
        .letter-btn.correct { background: #0f9d58; border-color: #a5ffb0; }
        .letter-btn.wrong { background: #c5221f; border-color: #ff8a8a; }

        .game-status-message {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffdb7c;
            min-height: 2.8rem;
        }

        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 18px 0 5px;
        }

        /* Боковая панель */
        .side-panel {
            background: #1a0b2ecc;
            border-radius: 36px;
            padding: 22px 18px;
            border: 1px solid #b76eff;
            box-shadow: 0 0 30px #6a0dad55;
            margin-bottom: 16px;
        }

        .panel-title {
            color: #ffd966;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 0 0 15px #ffae00;
        }

        .balance-box {
            background: #20083e;
            border-radius: 28px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #b76eff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1e0733;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .records-table {
            background: #1e0733;
            border-radius: 20px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .record-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #6a0dad;
            color: #f0dbff;
        }

        @media (max-width: 680px) {
            .game-wrapper { padding: 16px 12px; }
            .main-grid { flex-direction: column; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

<!-- Модальное окно входа/регистрации -->
<div class="auth-modal" id="authModal">
    <div class="auth-box">
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTabBtn">Вход</button>
            <button class="auth-tab" id="registerTabBtn">Регистрация</button>
        </div>
        <div id="loginForm">
            <input type="text" class="auth-input" id="loginUsername" placeholder="Никнейм" autocomplete="username">
            <input type="password" class="auth-input" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
            <div class="error-msg" id="loginError"></div>
            <button class="auth-btn" id="loginBtn">Войти</button>
        </div>
        <div id="registerForm" style="display: none;">
            <input type="text" class="auth-input" id="regUsername" placeholder="Придумайте ник" autocomplete="off">
            <input type="password" class="auth-input" id="regPassword" placeholder="Пароль" autocomplete="new-password">
            <input type="password" class="auth-input" id="regPasswordConfirm" placeholder="Повторите пароль" autocomplete="off">
            <div class="error-msg" id="regError"></div>
            <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
        </div>
        <p style="color:#b0a0d0; text-align:center; margin-top: 16px; font-size:0.8rem;">Данные хранятся локально в браузере</p>
    </div>
</div>

<!-- Основной интерфейс игры (скрыт) -->
<div class="game-wrapper" id="gameWrapper">
    <div class="user-bar">
        <div class="user-info">
            <span style="color:#ffd966;">👤 <span id="displayNick">—</span></span>
            <span style="color:#ffb347;">💰 <span id="displayCoins">0</span> монет</span>
            <span style="color:#b76eff;">💡 Подсказок: <span id="displayHints">0</span></span>
        </div>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>

    <h1>💀 NEON GALLOWS</h1>
    <div class="subtitle" style="text-align:center;color:#e0b0ff;margin-bottom:16px;">кооператив · рекорды · магазин</div>

    <div class="main-grid">
        <div class="game-col">
            <div class="lobby-panel">
                <div class="connection-row">
                    <button class="btn" id="hostBtn">🚀 Создать</button>
                    <span class="id-badge" id="myIdDisplay">—</span>
                    <button class="btn secondary" id="copyLinkBtn" disabled>📋 Копировать</button>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                    <span class="status" id="connectionStatus">⚪ Ожидание</span>
                    <span id="roomInfo" style="color:#b1f0ff;"></span>
                </div>
                <div class="players-list" id="playersContainer"></div>
                
                <div class="difficulty-selector" id="difficultyPanel" style="display: none;">
                    <div class="diff-btn active" data-diff="easy">🌱 Легко</div>
                    <div class="diff-btn" data-diff="medium">🍂 Средне</div>
                    <div class="diff-btn" data-diff="hard">🔥 Сложно</div>
                </div>
            </div>

            <div class="game-area">
                <canvas id="hangmanCanvas" width="260" height="200"></canvas>
                <div class="word-display" id="wordDisplay">—————</div>
                <div class="alphabet" id="alphabetContainer"></div>
                <div class="game-status-message" id="gameStatusMsg"></div>
                <div class="action-row">
                    <button class="btn hint-btn" id="hintButton" disabled>💡 Подсказка</button>
                    <button class="btn" id="newGameBtn" disabled>🔄 Новая игра</button>
                </div>
            </div>
        </div>

        <div class="side-col">
            <div class="side-panel">
                <div class="panel-title">🏪 МАГАЗИН</div>
                <div class="balance-box">
                    <span>💰 Баланс:</span>
                    <span style="font-size:1.8rem; font-weight:bold;" id="shopCoins">0</span>
                </div>
                <div class="shop-item">
                    <span>💡 +1 подсказка</span>
                    <span>50 монет</span>
                    <button class="btn secondary" id="buyHintBtn" style="padding:8px 16px;">Купить</button>
                </div>
                <div class="shop-item">
                    <span>💡 +5 подсказок</span>
                    <span>200 монет</span>
                    <button class="btn secondary" id="buyHint5Btn" style="padding:8px 16px;">Купить</button>
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-title">🏆 ТОП ИГРОКОВ</div>
                <div class="records-table" id="globalRecordsTable">
                    <!-- заполняется динамически -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- БАЗА ДАННЫХ (localStorage) ----------
        let usersDB = JSON.parse(localStorage.getItem('hangman_users')) || {};
        let currentUser = null; // { username, coins, hints, wordsGuessed }

        // Словари
        const WORDS = {
            easy: ["кот", "дом", "лес", "сон", "мир", "рот", "нос", "год", "век", "чай", "суп", "шкаф", "стул", "стол", "окно", "луна", "зима"],
            medium: ["машина", "дерево", "компьютер", "телефон", "клавиатура", "библиотека", "горизонт", "планета", "космос", "футбол", "календарь"],
            hard: ["экзистенциализм", "синхрофазотрон", "дезоксирибонуклеиновая", "параллелограмм", "электрокардиограф"]
        };

        // PeerJS
        let peer = null, conn = null, myPeerId = null, isHost = false;
        let players = new Map();
        let currentDifficulty = 'easy';
        
        let secretWord = '';
        let guessedLetters = [];
        let wrongAttempts = 0;
        const MAX_WRONG = 6;
        let gameActive = false;
        let gameResult = null;
        let hintUsedInGame = false;
        let hintsOwned = 0;

        // DOM элементы
        const authModal = document.getElementById('authModal');
        const gameWrapper = document.getElementById('gameWrapper');
        const canvas = document.getElementById('hangmanCanvas');
        const ctx = canvas.getContext('2d');
        const wordDisplay = document.getElementById('wordDisplay');
        const alphabetDiv = document.getElementById('alphabetContainer');
        const gameStatusMsg = document.getElementById('gameStatusMsg');
        const newGameBtn = document.getElementById('newGameBtn');
        const hintButton = document.getElementById('hintButton');
        const myIdSpan = document.getElementById('myIdDisplay');
        const statusSpan = document.getElementById('connectionStatus');
        const playersDiv = document.getElementById('playersContainer');
        const copyLinkBtn = document.getElementById('copyLinkBtn');
        const hostBtn = document.getElementById('hostBtn');
        const difficultyPanel = document.getElementById('difficultyPanel');
        const diffBtns = document.querySelectorAll('.diff-btn');
        const displayNick = document.getElementById('displayNick');
        const displayCoins = document.getElementById('displayCoins');
        const displayHints = document.getElementById('displayHints');
        const shopCoins = document.getElementById('shopCoins');
        const buyHintBtn = document.getElementById('buyHintBtn');
        const buyHint5Btn = document.getElementById('buyHint5Btn');

        // ---------- АВТОРИЗАЦИЯ ----------
        function saveUsersDB() {
            localStorage.setItem('hangman_users', JSON.stringify(usersDB));
        }

        function registerUser(username, password) {
            if (usersDB[username]) return { success: false, error: 'Пользователь уже существует' };
            usersDB[username] = {
                password: password,
                coins: 50,
                hints: 1,
                wordsGuessed: 0
            };
            saveUsersDB();
            return { success: true };
        }

        function loginUser(username, password) {
            const user = usersDB[username];
            if (!user) return { success: false, error: 'Пользователь не найден' };
            if (user.password !== password) return { success: false, error: 'Неверный пароль' };
            currentUser = { username, ...user };
            return { success: true };
        }

        function updateUserData() {
            if (!currentUser) return;
            usersDB[currentUser.username] = {
                password: currentUser.password,
                coins: currentUser.coins,
                hints: currentUser.hints,
                wordsGuessed: currentUser.wordsGuessed
            };
            saveUsersDB();
        }

        function updateUIAfterLogin() {
            displayNick.textContent = currentUser.username;
            displayCoins.textContent = currentUser.coins;
            displayHints.textContent = currentUser.hints;
            shopCoins.textContent = currentUser.coins;
            hintsOwned = currentUser.hints;
            hintButton.disabled = !gameActive || hintUsedInGame || hintsOwned <= 0;
        }

        function refreshGlobalRecords() {
            const recordsDiv = document.getElementById('globalRecordsTable');
            const sorted = Object.entries(usersDB)
                .map(([name, data]) => ({ name, guessed: data.wordsGuessed || 0 }))
                .sort((a,b) => b.guessed - a.guessed)
                .slice(0, 10);
            recordsDiv.innerHTML = sorted.map((p, i) => 
                `<div class="record-row"><span>${i+1}. ${p.name}</span><span>${p.guessed} 🏆</span></div>`
            ).join('') || '<div style="color:#aaa; text-align:center;">Нет данных</div>';
        }

        // Вкладки
        document.getElementById('loginTabBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTabBtn').classList.add('active');
            document.getElementById('registerTabBtn').classList.remove('active');
        };
        document.getElementById('registerTabBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerTabBtn').classList.add('active');
            document.getElementById('loginTabBtn').classList.remove('active');
        };

        document.getElementById('registerBtn').onclick = () => {
            const username = document.getElementById('regUsername').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const pwd2 = document.getElementById('regPasswordConfirm').value;
            const err = document.getElementById('regError');
            if (!username || !pwd) { err.textContent = 'Заполните все поля'; return; }
            if (pwd !== pwd2) { err.textContent = 'Пароли не совпадают'; return; }
            const res = registerUser(username, pwd);
            if (!res.success) { err.textContent = res.error; return; }
            alert('Регистрация успешна! Теперь войдите.');
            document.getElementById('loginTabBtn').click();
            document.getElementById('loginUsername').value = username;
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPasswordConfirm').value = '';
        };

        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('loginUsername').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            const err = document.getElementById('loginError');
            const res = loginUser(username, pwd);
            if (!res.success) { err.textContent = res.error; return; }
            authModal.style.display = 'none';
            gameWrapper.style.display = 'block';
            updateUIAfterLogin();
            refreshGlobalRecords();
            initPeer();
        };

        document.getElementById('logoutBtn').onclick = () => {
            if (conn) conn.close();
            if (peer) peer.destroy();
            currentUser = null;
            gameWrapper.style.display = 'none';
            authModal.style.display = 'flex';
            document.getElementById('loginPassword').value = '';
        };

        // ---------- PEER ----------
        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                myPeerId = id;
                myIdSpan.textContent = id;
                statusSpan.textContent = `🟢 Ваш ID: ${id}`;
                const params = new URLSearchParams(window.location.search);
                const connectId = params.get('connect');
                if (connectId) {
                    if (params.get('diff')) currentDifficulty = params.get('diff');
                    connectToHost(connectId);
                }
            });
            peer.on('connection', (c) => { conn = c; isHost = true; setupConnection(conn); statusSpan.textContent = `🟢 Игрок подключился`; difficultyPanel.style.display = 'flex'; sendGameState(); });
            peer.on('error', (e) => statusSpan.textContent = `🔴 Ошибка: ${e.type}`);
        }

        function connectToHost(hostId) {
            conn = peer.connect(hostId, { reliable: true });
            isHost = false;
            setupConnection(conn);
        }

        function setupConnection(connection) {
            conn.on('open', () => {
                statusSpan.textContent = `🟢 Соединение установлено`;
                copyLinkBtn.disabled = false;
                if (!isHost) difficultyPanel.style.display = 'none';
                conn.send({ type: 'player-info', name: currentUser.username });
                if (!isHost) setTimeout(() => conn.send({ type: 'sync-request' }), 300);
            });
            conn.on('data', handleNetworkMessage);
            conn.on('close', () => { statusSpan.textContent = `🔴 Соединение разорвано`; players.clear(); updatePlayersList(); conn = null; gameActive = false; newGameBtn.disabled = true; hintButton.disabled = true; });
        }

        function handleNetworkMessage(msg) {
            switch (msg.type) {
                case 'player-info':
                    players.set(conn.peer, { name: msg.name });
                    if (isHost) players.set(myPeerId, { name: currentUser.username });
                    updatePlayersList();
                    break;
                case 'game-state':
                    secretWord = msg.secretWord; guessedLetters = msg.guessedLetters; wrongAttempts = msg.wrongAttempts;
                    gameActive = msg.gameActive; gameResult = msg.gameResult; hintUsedInGame = msg.hintUsed;
                    currentDifficulty = msg.difficulty;
                    updateUI();
                    break;
                case 'guess':
                    if (!gameActive) return;
                    processGuess(msg.letter, false);
                    break;
                case 'new-game':
                    secretWord = msg.secretWord; guessedLetters = []; wrongAttempts = 0; gameActive = true; gameResult = null; hintUsedInGame = false;
                    currentDifficulty = msg.difficulty;
                    updateUI(); gameStatusMsg.textContent = '';
                    break;
                case 'use-hint':
                    if (!gameActive || hintUsedInGame) return;
                    applyHint(false);
                    break;
                case 'sync-request':
                    if (isHost) sendGameState();
                    break;
                case 'word-guessed-reward':
                    if (!isHost) {
                        currentUser.coins = (currentUser.coins || 0) + 20;
                        currentUser.wordsGuessed = (currentUser.wordsGuessed || 0) + 1;
                        updateUserData();
                        updateUIAfterLogin();
                        refreshGlobalRecords();
                    }
                    break;
            }
        }

        function sendGameState() {
            if (!conn) return;
            conn.send({
                type: 'game-state', secretWord, guessedLetters, wrongAttempts, gameActive, gameResult,
                difficulty: currentDifficulty, hintUsed: hintUsedInGame
            });
        }

        // ---------- ИГРА ----------
        function pickWord() { return WORDS[currentDifficulty][Math.floor(Math.random() * WORDS[currentDifficulty].length)].toUpperCase(); }

        function startNewGame() {
            secretWord = pickWord();
            guessedLetters = []; wrongAttempts = 0; gameActive = true; gameResult = null; hintUsedInGame = false;
            updateUI();
            gameStatusMsg.textContent = '';
            if (isHost && conn) broadcastNewGame();
            hintButton.disabled = !gameActive || hintUsedInGame || hintsOwned <= 0;
        }

        function broadcastNewGame() {
            if (!conn) return;
            conn.send({ type: 'new-game', secretWord, difficulty: currentDifficulty });
        }

        function processGuess(letter, broadcast = true) {
            if (!gameActive) return;
            if (guessedLetters.includes(letter)) return;
            guessedLetters.push(letter);
            const correct = secretWord.includes(letter);
            if (!correct) wrongAttempts++;
            
            let win = secretWord.split('').every(l => guessedLetters.includes(l));
            if (win) { 
                gameActive = false; gameResult = 'win'; gameStatusMsg.textContent = '🎉 ПОБЕДА!'; 
                if (isHost) {
                    currentUser.coins += 20;
                    currentUser.wordsGuessed += 1;
                    updateUserData();
                    updateUIAfterLogin();
                    refreshGlobalRecords();
                    if (conn) conn.send({ type: 'word-guessed-reward' });
                }
            } else if (wrongAttempts >= MAX_WRONG) { gameActive = false; gameResult = 'lose'; gameStatusMsg.textContent = `💀 ПОРАЖЕНИЕ! Слово: ${secretWord}`; }
            
            updateUI();
            if (broadcast && conn) { conn.send({ type: 'guess', letter }); if (!gameActive) sendGameState(); }
            if (!gameActive) hintButton.disabled = true;
        }

        function applyHint(broadcast = true) {
            if (!gameActive || hintUsedInGame || hintsOwned <= 0) return;
            const hidden = secretWord.split('').filter(l => !guessedLetters.includes(l));
            if (hidden.length === 0) return;
            const letter = hidden[Math.floor(Math.random() * hidden.length)];
            hintUsedInGame = true;
            hintsOwned--;
            currentUser.hints = hintsOwned;
            updateUserData();
            updateUIAfterLogin();
            processGuess(letter, broadcast);
            if (broadcast && conn) conn.send({ type: 'use-hint' });
        }

        function updateUI() {
            wordDisplay.textContent = secretWord.split('').map(c => guessedLetters.includes(c) ? c : '_').join(' ');
            drawHangman(wrongAttempts);
            renderAlphabet();
            newGameBtn.disabled = !isHost;
            hintButton.disabled = !gameActive || hintUsedInGame || hintsOwned <= 0;
        }

        function drawHangman(stage) {
            ctx.clearRect(0,0,260,200); ctx.lineWidth=4; ctx.strokeStyle='#ffb347'; ctx.fillStyle='#ffb347'; ctx.shadowColor='#ffae00'; ctx.shadowBlur=12;
            if(stage>=1){ctx.beginPath(); ctx.moveTo(20,180); ctx.lineTo(80,180); ctx.moveTo(50,180); ctx.lineTo(50,30); ctx.lineTo(120,30); ctx.lineTo(120,55); ctx.stroke();}
            if(stage>=2){ctx.beginPath(); ctx.arc(120,75,20,0,Math.PI*2); ctx.stroke();}
            if(stage>=3){ctx.beginPath(); ctx.moveTo(120,95); ctx.lineTo(120,145); ctx.stroke();}
            if(stage>=4){ctx.beginPath(); ctx.moveTo(120,110); ctx.lineTo(90,130); ctx.stroke();}
            if(stage>=5){ctx.beginPath(); ctx.moveTo(120,110); ctx.lineTo(150,130); ctx.stroke();}
            if(stage>=6){ctx.beginPath(); ctx.moveTo(120,145); ctx.lineTo(95,175); ctx.stroke();}
            if(stage>=7){ctx.beginPath(); ctx.moveTo(120,145); ctx.lineTo(145,175); ctx.stroke();}
            ctx.shadowBlur=0;
        }

        function renderAlphabet() {
            const letters = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split('');
            alphabetDiv.innerHTML = '';
            letters.forEach(l => {
                const btn = document.createElement('div'); btn.className = 'letter-btn'; btn.textContent = l;
                if (guessedLetters.includes(l)) { btn.classList.add('used'); btn.classList.add(secretWord.includes(l)?'correct':'wrong'); }
                btn.addEventListener('click', ()=> { if(gameActive && !guessedLetters.includes(l)) processGuess(l, true); });
                alphabetDiv.appendChild(btn);
            });
        }

        function updatePlayersList() {
            let html = ''; for (let [id,p] of players) html += `<span class="player-tag">${p.name}</span>`; playersDiv.innerHTML = html||'—';
        }

        // Магазин
        buyHintBtn.onclick = () => {
            if (currentUser.coins < 50) { alert('Недостаточно монет'); return; }
            currentUser.coins -= 50;
            currentUser.hints += 1;
            hintsOwned = currentUser.hints;
            updateUserData();
            updateUIAfterLogin();
            hintButton.disabled = !gameActive || hintUsedInGame || hintsOwned <= 0;
        };
        buyHint5Btn.onclick = () => {
            if (currentUser.coins < 200) { alert('Недостаточно монет'); return; }
            currentUser.coins -= 200;
            currentUser.hints += 5;
            hintsOwned = currentUser.hints;
            updateUserData();
            updateUIAfterLogin();
            hintButton.disabled = !gameActive || hintUsedInGame || hintsOwned <= 0;
        };

        // Остальные обработчики
        hostBtn.onclick = ()=> { if(!peer) initPeer(); let i = setInterval(()=>{ if(myPeerId){ clearInterval(i); isHost=true; players.set(myPeerId,{name:currentUser.username}); updatePlayersList(); difficultyPanel.style.display='flex'; statusSpan.textContent='🟡 Ожидание...'; 
            const url=new URL(location); url.searchParams.set('connect',myPeerId); url.searchParams.set('diff',currentDifficulty); history.replaceState({},'',url); copyLinkBtn.disabled=false; startNewGame(); }},100); };
        copyLinkBtn.onclick = ()=> { const url=new URL(location); url.searchParams.set('connect',myPeerId); navigator.clipboard?.writeText(url.href).then(()=>alert('✅ Ссылка скопирована!')).catch(()=>prompt('Скопируйте:',url.href)); };
        diffBtns.forEach(b=> b.onclick = ()=> { if(!isHost) return; diffBtns.forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentDifficulty=b.dataset.diff; const url=new URL(location); url.searchParams.set('diff',currentDifficulty); history.replaceState({},'',url); });
        newGameBtn.onclick = ()=> { if(isHost) startNewGame(); };
        hintButton.onclick = ()=> { applyHint(true); };

        window.onload = () => {
            // Проверка, есть ли сохранённая сессия (не делаем автологин для простоты)
        };
    })();
</script>
</body>
